<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="奉仕記録">
<link rel="apple-touch-icon" sizes="180x180" href="/volunteer-tracker/apple-touch-icon-v2.png">
<title>奉仕時間記録</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }
button, .tab { -webkit-user-select: none; user-select: none; touch-action: manipulation; }
.app { max-width: 430px; margin: 0 auto; padding: 0 0 calc(74px + env(safe-area-inset-bottom)) 0; }
.tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid #c6c6c8; display: flex; z-index: 100; padding-bottom: max(env(safe-area-inset-bottom), 8px); }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 4px; font-size: 10px; color: #8e8e93; cursor: pointer; gap: 3px; transition: transform 0.08s ease, opacity 0.08s ease; }
.tab.active { color: #1D9E75; }
.tab svg { width: 24px; height: 24px; }
.header { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 16px 20px 12px; border-bottom: 0.5px solid #c6c6c8; position: sticky; top: 0; z-index: 50; }
.header-title { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 13px; color: #8e8e93; margin-top: 2px; }
.section { padding: 20px 16px 0; }
.card { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.progress-wrap { padding: 16px; }
.progress-nums { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.progress-main { font-size: 32px; font-weight: 600; color: #1D9E75; }
.progress-goal { font-size: 14px; color: #8e8e93; }
.progress-bar { height: 6px; background: #e5e5ea; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.4s ease; }
.progress-remain { font-size: 13px; color: #8e8e93; margin-top: 6px; }
.cat-row { display: flex; gap: 8px; padding: 0 16px 16px; }
.cat-btn { flex: 1; padding: 10px 8px; border-radius: 10px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease, background-color 0.12s ease; background: #f2f2f7; color: #8e8e93; }
.cat-btn.active { background: #1D9E75; color: #fff; }
.timer-area { padding: 8px 16px 16px; text-align: center; }
.timer-label { font-size: 13px; color: #8e8e93; margin-bottom: 4px; min-height: 18px; }
.timer-display { font-size: 48px; font-weight: 200; letter-spacing: 2px; color: #1c1c1e; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
.timer-display.running { color: #1D9E75; }
.btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease, background-color 0.12s ease; }
.btn-green { background: #1D9E75; color: #fff; }
.btn-green:active { background: #158a63; }
.btn-red { background: #ff3b30; color: #fff; }
.btn-red:active { background: #d93025; }
.btn-gray { background: #f2f2f7; color: #1c1c1e; }
.btn-gray:active { background: #e5e5ea; }
.btn-link { background: none; border: none; font-size: 15px; color: #1D9E75; cursor: pointer; padding: 10px 0; display: block; width: 100%; text-align: center; transition: transform 0.08s ease, opacity 0.08s ease; }
.btn-link.muted { color: #8e8e93; }
.divider { display: flex; align-items: center; gap: 10px; padding: 4px 0 8px; }
.divider-line { flex: 1; height: 0.5px; background: #e5e5ea; }
.divider-text { font-size: 12px; color: #c7c7cc; }
.manual-area { padding: 0 16px 16px; }
.input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.input-row label { font-size: 15px; color: #8e8e93; width: 38px; flex-shrink: 0; }
.input-row input { flex: 1; font-size: 16px; padding: 10px 12px; border: 0.5px solid #c6c6c8; border-radius: 10px; background: #fff; color: #1c1c1e; -webkit-appearance: none; }
.input-row input:focus { outline: none; border-color: #1D9E75; }
.deduct-area { padding: 0 16px; }
.deduct-title { font-size: 13px; color: #8e8e93; margin-bottom: 10px; }
.deduct-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.deduct-row input { flex: 1; font-size: 15px; padding: 8px 10px; border: 0.5px solid #c6c6c8; border-radius: 10px; background: #fff; color: #1c1c1e; -webkit-appearance: none; }
.deduct-row input:focus { outline: none; border-color: #1D9E75; }
.deduct-sep { font-size: 13px; color: #c7c7cc; }
.deduct-del { width: 28px; height: 28px; border-radius: 50%; background: #ff3b30; border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease; }
.btn-add-deduct { background: none; border: none; font-size: 15px; color: #1D9E75; cursor: pointer; padding: 6px 0 12px; display: block; transition: transform 0.08s ease, opacity 0.08s ease; }
.log-item { padding: 12px 16px; border-bottom: 0.5px solid #f2f2f7; display: flex; align-items: center; justify-content: space-between; }
.log-item:last-child { border-bottom: none; }
.log-date-str { font-size: 15px; font-weight: 500; }
.log-time-str { font-size: 13px; color: #8e8e93; margin-top: 2px; }
.log-right { text-align: right; }
.log-hours { font-size: 20px; font-weight: 600; color: #1c1c1e; }
.log-hours span { font-size: 13px; font-weight: 400; color: #8e8e93; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-bottom: 4px; }
.badge-main { background: #d1f0e7; color: #0f6e56; }
.badge-other { background: #fef0cc; color: #854f0b; }
.badge-manual { background: #f2f2f7; color: #8e8e93; margin-left: 4px; }
.summary-big { padding: 16px; }
.summary-label { font-size: 13px; color: #8e8e93; margin-bottom: 4px; }
.summary-num { font-size: 40px; font-weight: 600; color: #1D9E75; }
.summary-unit { font-size: 18px; font-weight: 400; color: #8e8e93; }
.summary-row { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #f2f2f7; }
.summary-row:last-child { border-bottom: none; }
.summary-row-label { font-size: 15px; }
.summary-row-val { font-size: 15px; font-weight: 500; }
.summary-remain { font-size: 13px; color: #8e8e93; padding: 12px 16px; }
.setting-row { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #f2f2f7; }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 16px; }
.setting-input { width: 80px; font-size: 16px; padding: 6px 10px; border: 0.5px solid #c6c6c8; border-radius: 8px; text-align: right; color: #1c1c1e; background: #fff; }
.setting-unit { font-size: 15px; color: #8e8e93; margin-left: 6px; }
.setting-save { background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 200; }
.toast.show { opacity: 1; }
.empty { padding: 32px 16px; text-align: center; font-size: 15px; color: #c7c7cc; }
.section-header { font-size: 13px; color: #8e8e93; padding: 16px 16px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.is-pressing { transform: scale(0.97); filter: brightness(0.94); opacity: 0.82; }
.btn-primary.is-pressing { transform: scale(0.985); filter: brightness(0.9); opacity: 1; }
.tab.is-pressing { transform: translateY(1px) scale(0.96); filter: none; opacity: 0.65; }
.btn-link.is-pressing, .btn-add-deduct.is-pressing { transform: scale(0.98); filter: none; opacity: 0.55; }

.log-left { min-width: 0; padding-right: 10px; }
.log-actions { margin-top: 8px; }
.log-edit-btn { border: none; background: #f2f2f7; color: #1D9E75; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease, background-color 0.12s ease; }
.log-edit-btn:active { background: #e5e5ea; }
.log-item.editing { background: #f3fbf8; }
.edit-card { overflow: visible; }
.edit-title { padding: 16px 16px 4px; font-size: 17px; font-weight: 600; }
.edit-sub { padding: 0 16px 12px; font-size: 13px; color: #8e8e93; }
.edit-area { padding: 0 16px 16px; }
.edit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.edit-row label { font-size: 15px; color: #8e8e93; width: 70px; flex-shrink: 0; }
.edit-row input { flex: 1; font-size: 16px; padding: 10px 12px; border: 0.5px solid #c6c6c8; border-radius: 10px; background: #fff; color: #1c1c1e; -webkit-appearance: none; }
.edit-row input:focus { outline: none; border-color: #1D9E75; }
.edit-cat-row { display: flex; gap: 8px; margin-bottom: 12px; }
.edit-cat-btn { flex: 1; padding: 10px 8px; border-radius: 10px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: transform 0.08s ease, filter 0.08s ease, opacity 0.08s ease, background-color 0.12s ease; background: #f2f2f7; color: #8e8e93; }
.edit-cat-btn.active { background: #1D9E75; color: #fff; }
.edit-actions { display: flex; gap: 8px; margin-top: 4px; }
.edit-actions .btn-primary { flex: 1; }
.edit-delete { background: none; border: none; color: #ff3b30; font-size: 15px; padding: 12px 0 0; width: 100%; cursor: pointer; transition: transform 0.08s ease, opacity 0.08s ease; }
.badge-edited { background: #e8f1ff; color: #1d4f91; margin-left: 4px; }

</style>
</head>
<body>
<div class="app">
  <div id="view-record">
    <div class="header">
      <div class="header-title">奉仕時間記録</div>
      <div class="header-sub" id="header-month"></div>
    </div>
    <div class="section">
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-nums">
            <div class="progress-main" id="total-display">0分</div>
            <div class="progress-goal" id="goal-label">目標 30時間</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-remain" id="progress-remain">残り 30時間</div>
        </div>
      </div>
      <div class="card">
        <div style="padding:16px 16px 8px">
          <div style="font-size:13px;color:#8e8e93;margin-bottom:10px">カテゴリ</div>
          <div class="cat-row" style="padding:0;margin-bottom:0">
            <button class="cat-btn active" id="btn-main" onclick="selectCat('main')">野外奉仕</button>
            <button class="cat-btn" id="btn-other" onclick="selectCat('other')">その他の奉仕</button>
          </div>
        </div>
        <div id="timer-section">
          <div class="timer-area">
            <div class="timer-label" id="timer-label">開始ボタンを押してください</div>
            <div class="timer-display" id="timer-display">00:00:00</div>
            <button class="btn-primary btn-green" id="start-btn" onclick="toggleTimer()">開始</button>
          </div>
          <div style="padding:0 16px">
            <div class="divider"><div class="divider-line"></div><div class="divider-text">または</div><div class="divider-line"></div></div>
            <button class="btn-link" onclick="showManual()">時刻を手動で入力する</button>
          </div>
        </div>
        <div id="manual-section" style="display:none">
          <div class="manual-area">
            <div class="input-row"><label>日付</label><input type="date" id="manual-date"></div>
            <div class="input-row"><label>開始</label><input type="time" id="manual-start"></div>
            <div class="input-row"><label>終了</label><input type="time" id="manual-end"></div>
            <button class="btn-primary btn-green" onclick="submitManual()">次へ</button>
            <button class="btn-link muted" onclick="hideManual()">タイマーに戻る</button>
          </div>
        </div>
      </div>
      <div class="card" id="deduct-card" style="display:none">
        <div style="padding:16px 16px 4px">
          <div class="deduct-title">中断時間を差し引く（任意）</div>
          <div id="deduct-list"></div>
          <button class="btn-add-deduct" onclick="addDeductRow()">＋ 中断時間を追加</button>
        </div>
        <div style="padding:0 16px 16px">
          <button class="btn-primary btn-gray" onclick="confirmSession()">記録を確定する</button>
        </div>
      </div>
    </div>
  </div>
  <div id="view-log" style="display:none">
    <div class="header"><div class="header-title">今月の履歴</div></div>
    <div class="card" style="margin:16px">
      <div id="log-list"><div class="empty">記録がまだありません</div></div>
    </div>
    <div class="card edit-card" id="edit-card" style="display:none;margin:16px">
      <div class="edit-title">記録を編集</div>
      <div class="edit-sub" id="edit-sub">選択した記録を修正します</div>
      <div class="edit-area">
        <div class="edit-cat-row">
          <button class="edit-cat-btn active" id="edit-cat-main" onclick="selectEditCat('main')">野外奉仕</button>
          <button class="edit-cat-btn" id="edit-cat-other" onclick="selectEditCat('other')">その他の奉仕</button>
        </div>
        <div class="edit-row"><label>日付</label><input type="date" id="edit-date"></div>
        <div class="edit-row"><label>開始</label><input type="time" id="edit-start"></div>
        <div class="edit-row"><label>終了</label><input type="time" id="edit-end"></div>
        <div class="edit-row"><label>中断</label><input type="number" id="edit-deduct" min="0" step="1" inputmode="numeric"><span class="setting-unit">分</span></div>
        <div class="edit-actions">
          <button class="btn-primary btn-green" onclick="saveEditSession()">保存</button>
          <button class="btn-primary btn-gray" onclick="cancelEditSession()">キャンセル</button>
        </div>
        <button class="edit-delete" onclick="deleteEditSession()">この記録を削除する</button>
      </div>
    </div>
  </div>
  <div id="view-summary" style="display:none">
    <div class="header"><div class="header-title">今月の集計</div></div>
    <div style="margin:16px">
      <div class="card">
        <div class="summary-big">
          <div class="summary-label">合計時間</div>
          <div class="summary-num" id="sum-total">0分</div>
        </div>
        <div class="summary-row"><span class="summary-row-label">野外奉仕</span><span class="summary-row-val" id="sum-main">0分</span></div>
        <div class="summary-row"><span class="summary-row-label">その他の奉仕</span><span class="summary-row-val" id="sum-other">0分</span></div>
        <div class="summary-remain" id="sum-remain">目標まで残り 30時間</div>
      </div>
    </div>
  </div>
  <div id="view-settings" style="display:none">
    <div class="header"><div class="header-title">設定</div></div>
    <div style="margin:16px">
      <div class="section-header">月次目標</div>
      <div class="card">
        <div class="setting-row">
          <span class="setting-label">目標時間</span>
          <div style="display:flex;align-items:center">
            <input type="number" class="setting-input" id="goal-input" value="30" min="1" max="999">
            <span class="setting-unit">時間</span>
            <button class="setting-save" onclick="saveGoal()" style="margin-left:10px">保存</button>
          </div>
        </div>
      </div>
      <div style="font-size:13px;color:#8e8e93;padding:8px 4px">毎月この値がデフォルト目標として適用されます。</div>
    </div>
  </div>
</div>
<nav class="tab-bar">
  <div class="tab active" onclick="showTab('record')" id="tab-record">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>記録
  </div>
  <div class="tab" onclick="showTab('log')" id="tab-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>履歴
  </div>
  <div class="tab" onclick="showTab('summary')" id="tab-summary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>集計
  </div>
  <div class="tab" onclick="showTab('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>設定
  </div>
</nav>
<div class="toast" id="toast"></div>
<script>
const CAT_LABEL = { main: '野外奉仕', other: 'その他の奉仕' };
function makeSessionId() {
  return 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}
function sessionMinutes(s) {
  if (Number.isFinite(Number(s.totalMin))) return Number(s.totalMin);
  return Math.round((Number(s.hours) || 0) * 60);
}
function loadSessions() {
  let sessions = [];
  try {
    const saved = JSON.parse(localStorage.getItem('vt_sessions') || '[]');
    if (Array.isArray(saved)) sessions = saved;
  } catch (e) {
    sessions = [];
  }
  let changed = false;
  sessions = sessions.map(s => {
    const copy = { ...s };
    if (!copy.id) { copy.id = makeSessionId(); changed = true; }
    if (!Number.isFinite(Number(copy.deductMin))) { copy.deductMin = 0; changed = true; }
    if (!Number.isFinite(Number(copy.totalMin))) {
      copy.totalMin = sessionMinutes(copy);
      changed = true;
    }
    if (!Number.isFinite(Number(copy.hours))) {
      copy.hours = copy.totalMin / 60;
      changed = true;
    }
    return copy;
  });
  if (changed) localStorage.setItem('vt_sessions', JSON.stringify(sessions));
  return sessions;
}
function persistSessions() {
  localStorage.setItem('vt_sessions', JSON.stringify(state.sessions));
}
let state = {
  running: false, startTime: null, endTime: null, manualDate: null,
  category: 'main', isManual: false, timerInterval: null,
  sessions: loadSessions(),
  goal: parseFloat(localStorage.getItem('vt_goal') || '30')
};
let editingSessionId = null;
let editCat = 'main';
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getMonthKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function dateToMonthKey(s) { return s.slice(0,7); }
function thisMonthSessions() { return state.sessions.filter(s => s.month === getMonthKey()); }
function sumHours(arr) { return arr.reduce((a,s) => a + sessionMinutes(s), 0) / 60; }
function mainHours() { return sumHours(thisMonthSessions().filter(s=>s.cat==='main')); }
function otherHours() { return sumHours(thisMonthSessions().filter(s=>s.cat==='other')); }
function allHours() { return mainHours() + otherHours(); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function updateHeader() {
  const d = new Date();
  document.getElementById('header-month').textContent = d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}
function updateProgress() {
  const total = allHours();
  const remaining = Math.max(0, state.goal - total);
  const pct = Math.min(100, Math.round(total / state.goal * 100));
  document.getElementById('total-display').textContent = fmtHours(total);
  document.getElementById('goal-label').textContent = '目標 '+fmtGoalHours(state.goal);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-remain').textContent = '残り '+fmtHours(remaining);
}
function selectCat(cat) {
  state.category = cat;
  document.getElementById('btn-main').classList.toggle('active', cat==='main');
  document.getElementById('btn-other').classList.toggle('active', cat==='other');
}
function showManual() {
  document.getElementById('manual-date').value = todayStr();
  document.getElementById('timer-section').style.display = 'none';
  document.getElementById('manual-section').style.display = 'block';
  document.getElementById('deduct-card').style.display = 'none';
}
function hideManual() {
  document.getElementById('manual-section').style.display = 'none';
  document.getElementById('timer-section').style.display = 'block';
}
function toggleTimer() {
  if (!state.running) {
    state.running = true; state.startTime = new Date();
    const btn = document.getElementById('start-btn');
    btn.textContent = '終了'; btn.className = 'btn-primary btn-red';
    document.getElementById('timer-label').textContent = '計測中...';
    document.getElementById('timer-display').classList.add('running');
    state.timerInterval = setInterval(updateTimerDisplay, 1000);
  } else {
    state.running = false; state.endTime = new Date();
    state.manualDate = todayStr(); state.isManual = false;
    clearInterval(state.timerInterval);
    document.getElementById('timer-display').classList.remove('running');
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('timer-label').textContent = fmtTime(state.startTime)+' 〜 '+fmtTime(state.endTime);
    deductRows = [];
    document.getElementById('deduct-card').style.display = 'block';
    renderDeductList();
  }
}
function fmtHours(h) {
  const totalMin = Math.round(h * 60);
  const hrs = Math.floor(totalMin / 60);
  const min = totalMin % 60;
  if (hrs === 0) return min + '分';
  if (min === 0) return hrs + '時間';
  return hrs + '時間' + min + '分';
}
function fmtGoalHours(h) {
  const num = Number(h);
  if (!Number.isFinite(num)) return '0時間';
  return (Number.isInteger(num) ? String(num) : String(num).replace(/\.0$/, '')) + '時間';
}
function fmtTime(d) {
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function updateTimerDisplay() {
  const diff = Math.floor((new Date() - state.startTime) / 1000);
  const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
  document.getElementById('timer-display').textContent =
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function submitManual() {
  const dv = document.getElementById('manual-date').value;
  const sv = document.getElementById('manual-start').value;
  const ev = document.getElementById('manual-end').value;
  if (!dv || !sv || !ev) { showToast('日付・開始・終了を入力してください'); return; }
  const [sh,sm] = sv.split(':').map(Number);
  const [eh,em] = ev.split(':').map(Number);
  if (eh*60+em <= sh*60+sm) { showToast('終了時刻は開始より後にしてください'); return; }
  const [yr,mo,dy] = dv.split('-').map(Number);
  state.startTime = new Date(yr, mo-1, dy, sh, sm);
  state.endTime = new Date(yr, mo-1, dy, eh, em);
  state.manualDate = dv; state.isManual = true;
  deductRows = [];
  document.getElementById('manual-section').style.display = 'none';
  document.getElementById('timer-section').style.display = 'block';
  document.getElementById('timer-label').textContent = dv.replace(/-/g,'/')+' '+sv+' 〜 '+ev;
  document.getElementById('timer-display').textContent = '00:00:00';
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('deduct-card').style.display = 'block';
  renderDeductList();
}
let deductRows = [];
function renderDeductList() {
  const container = document.getElementById('deduct-list');
  container.innerHTML = '';
  deductRows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'deduct-row';
    div.innerHTML = '<input type="time" value="'+row.from+'" onchange="deductRows['+i+'].from=this.value">'+
      '<span class="deduct-sep">〜</span>'+
      '<input type="time" value="'+row.to+'" onchange="deductRows['+i+'].to=this.value">'+
      '<button class="deduct-del" onclick="removeDeduct('+i+')">×</button>';
    container.appendChild(div);
  });
}
function addDeductRow() { deductRows.push({from:'',to:''}); renderDeductList(); }
function removeDeduct(i) { deductRows.splice(i,1); renderDeductList(); }
function parseHM(str) {
  if (!str) return null;
  const p = str.split(':');
  if (p.length !== 2) return null;
  const h = parseInt(p[0]), m = parseInt(p[1]);
  if (isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}
function confirmSession() {
  const startMin = state.startTime.getHours()*60 + state.startTime.getMinutes();
  const endMin = state.endTime.getHours()*60 + state.endTime.getMinutes();
  let netMin = endMin - startMin;
  let deductMin = 0;
  for (const row of deductRows) {
    const f = parseHM(row.from), t = parseHM(row.to);
    if (f !== null && t !== null && t > f) deductMin += (t - f);
  }
  netMin = Math.max(0, netMin - deductMin);
  const dateStr = state.manualDate;
  const session = {
    id: makeSessionId(),
    month: dateToMonthKey(dateStr),
    date: dateStr.replace(/-/g,'/'),
    dateKey: dateStr,
    cat: state.category,
    start: fmtTime(state.startTime),
    end: fmtTime(state.endTime),
    deductMin: deductMin,
    totalMin: netMin,
    hours: netMin / 60,
    manual: state.isManual,
    edited: false
  };
  state.sessions.push(session);
  persistSessions();
  deductRows = [];
  document.getElementById('deduct-card').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('start-btn').textContent = '開始';
  document.getElementById('start-btn').className = 'btn-primary btn-green';
  document.getElementById('timer-display').textContent = '00:00:00';
  document.getElementById('timer-label').textContent = '開始ボタンを押してください';
  document.getElementById('manual-start').value = '';
  document.getElementById('manual-end').value = '';
  updateProgress();
  showToast(fmtHours(session.hours)+' を記録しました');
}
function renderLog() {
  const container = document.getElementById('log-list');
  const sessions = thisMonthSessions().slice().sort((a,b) => {
    if (a.dateKey !== b.dateKey) return b.dateKey > a.dateKey ? 1 : -1;
    if (a.start !== b.start) return b.start > a.start ? 1 : -1;
    return String(b.id).localeCompare(String(a.id));
  });
  if (sessions.length === 0) {
    container.innerHTML = '<div class="empty">記録がまだありません</div>';
    cancelEditSession(false);
    return;
  }
  container.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'log-item';
    if (s.id === editingSessionId) div.classList.add('editing');
    const deductNote = s.deductMin > 0 ? '（-'+s.deductMin+'分）' : '';
    const manualBadge = s.manual ? '<span class="badge badge-manual">手動</span>' : '';
    const editedBadge = s.edited ? '<span class="badge badge-edited">編集済</span>' : '';
    div.innerHTML = '<div class="log-left"><div class="log-date-str">'+s.date+'</div>'+ 
      '<div class="log-time-str">'+s.start+' 〜 '+s.end+deductNote+'</div>'+ 
      '<div class="log-actions"><button class="log-edit-btn" type="button">編集</button></div></div>'+ 
      '<div class="log-right"><div><span class="badge badge-'+(s.cat==='main'?'main':'other')+'">'+CAT_LABEL[s.cat]+'</span>'+manualBadge+editedBadge+'</div>'+ 
      '<div class="log-hours">'+fmtHours(sessionMinutes(s) / 60)+'</div></div>';
    div.querySelector('.log-edit-btn').addEventListener('click', () => startEditSession(s.id));
    container.appendChild(div);
  });
}
function selectEditCat(cat) {
  editCat = cat;
  document.getElementById('edit-cat-main').classList.toggle('active', cat==='main');
  document.getElementById('edit-cat-other').classList.toggle('active', cat==='other');
}
function startEditSession(id) {
  const session = state.sessions.find(s => s.id === id);
  if (!session) { showToast('編集する記録が見つかりません'); return; }
  editingSessionId = id;
  selectEditCat(session.cat || 'main');
  document.getElementById('edit-date').value = session.dateKey;
  document.getElementById('edit-start').value = session.start;
  document.getElementById('edit-end').value = session.end;
  document.getElementById('edit-deduct').value = Number(session.deductMin) || 0;
  document.getElementById('edit-sub').textContent = session.date + ' ' + session.start + ' 〜 ' + session.end;
  document.getElementById('edit-card').style.display = 'block';
  renderLog();
  document.getElementById('edit-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function cancelEditSession(resetId = true) {
  const editCard = document.getElementById('edit-card');
  if (editCard) editCard.style.display = 'none';
  if (resetId) editingSessionId = null;
}
function getEditValues() {
  const dateStr = document.getElementById('edit-date').value;
  const start = document.getElementById('edit-start').value;
  const end = document.getElementById('edit-end').value;
  const deductMin = parseInt(document.getElementById('edit-deduct').value || '0', 10);
  if (!dateStr || !start || !end) { showToast('日付・開始・終了を入力してください'); return null; }
  const startMin = parseHM(start), endMin = parseHM(end);
  if (startMin === null || endMin === null) { showToast('時刻を正しく入力してください'); return null; }
  if (endMin <= startMin) { showToast('終了時刻は開始より後にしてください'); return null; }
  if (isNaN(deductMin) || deductMin < 0) { showToast('中断時間は0分以上で入力してください'); return null; }
  const grossMin = endMin - startMin;
  if (deductMin >= grossMin) { showToast('中断時間が全体時間以上です'); return null; }
  return { dateStr, start, end, deductMin, netMin: grossMin - deductMin };
}
function saveEditSession() {
  if (!editingSessionId) { showToast('編集する記録が選択されていません'); return; }
  const values = getEditValues();
  if (!values) return;
  const index = state.sessions.findIndex(s => s.id === editingSessionId);
  if (index === -1) { showToast('編集する記録が見つかりません'); return; }
  const prev = state.sessions[index];
  state.sessions[index] = {
    ...prev,
    month: dateToMonthKey(values.dateStr),
    date: values.dateStr.replace(/-/g,'/'),
    dateKey: values.dateStr,
    cat: editCat,
    start: values.start,
    end: values.end,
    deductMin: values.deductMin,
    totalMin: values.netMin,
    hours: values.netMin / 60,
    edited: true
  };
  persistSessions();
  updateProgress();
  renderSummary();
  renderLog();
  cancelEditSession();
  showToast('記録を更新しました');
}
function deleteEditSession() {
  if (!editingSessionId) { showToast('削除する記録が選択されていません'); return; }
  const session = state.sessions.find(s => s.id === editingSessionId);
  if (!session) { showToast('削除する記録が見つかりません'); return; }
  if (!confirm(session.date+' '+session.start+' 〜 '+session.end+' の記録を削除しますか？')) return;
  state.sessions = state.sessions.filter(s => s.id !== editingSessionId);
  persistSessions();
  updateProgress();
  renderSummary();
  cancelEditSession();
  renderLog();
  showToast('記録を削除しました');
}
function renderSummary() {
  const main = mainHours(), other = otherHours(), total = main + other;
  const remaining = Math.max(0, state.goal - total);
  document.getElementById('sum-total').innerHTML = fmtHours(total);
  document.getElementById('sum-main').textContent = fmtHours(main);
  document.getElementById('sum-other').textContent = fmtHours(other);
  document.getElementById('sum-remain').textContent = '目標まで残り '+fmtHours(remaining);
}
function saveGoal() {
  const val = parseFloat(document.getElementById('goal-input').value);
  if (!isNaN(val) && val > 0) {
    state.goal = val;
    localStorage.setItem('vt_goal', val);
    updateProgress(); renderSummary();
    showToast('目標を保存しました');
  }
}
function showTab(tab) {
  ['record','log','summary','settings'].forEach(t => {
    document.getElementById('view-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab !== 'log') cancelEditSession();
  if (tab==='log') renderLog();
  if (tab==='summary') renderSummary();
  if (tab==='settings') document.getElementById('goal-input').value = state.goal;
}
function softHaptic() {
  try {
    if ('vibrate' in navigator) navigator.vibrate(8);
  } catch (e) {}
}
function initPressFeedback() {
  const pressSelector = 'button, .tab';
  let activeEl = null;
  let releaseTimer = null;
  function clearPress(delay = 0) {
    clearTimeout(releaseTimer);
    releaseTimer = setTimeout(() => {
      if (activeEl) activeEl.classList.remove('is-pressing');
      activeEl = null;
    }, delay);
  }
  function startPress(el) {
    clearPress(0);
    activeEl = el;
    activeEl.classList.add('is-pressing');
    softHaptic();
  }
  document.addEventListener('pointerdown', e => {
    const el = e.target.closest(pressSelector);
    if (!el) return;
    startPress(el);
  }, { passive: true });
  document.addEventListener('pointerup', () => clearPress(90), { passive: true });
  document.addEventListener('pointercancel', () => clearPress(0), { passive: true });
  document.addEventListener('scroll', () => clearPress(0), { passive: true });
  document.addEventListener('visibilitychange', () => clearPress(0));
}
initPressFeedback();
updateHeader();
updateProgress();
</script>
</body>
</html>
